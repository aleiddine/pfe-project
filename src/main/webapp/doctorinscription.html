<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Connexion Médecin</title>

  <link rel="stylesheet" href="style1.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <div class="container">

    <div class="card">

      <h1>Espace Médecin</h1>
      <img src="dr.jpg" alt="Docteur" class="doctor-profile-img">
      <p class="subtitle">Connexion / Inscription</p>

      <form action="signin" method="POST">

        <div class="form-row">

          <div class="input-group" style="width: 100%;">
            <label>Nom complet</label>
            <input type="text" name="name" placeholder="Nom et prénom du médecin" required>
          </div>

        </div>

        <div class="form-row">

          <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="exemple@email.com" required>
          </div>

          <div class="input-group">
            <label>Téléphone</label>
            <input type="tel" name="phone" placeholder="+216 xx xxx xxx">
          </div>

        </div>

        <div class="form-row">

          <div class="input-group">
            <label>Sexe</label>
            <select id="sexeInput">
              <option value="">Choisir</option>
              <option value="Homme">Homme</option>
              <option value="Femme">Femme</option>
            </select>
          </div>

          <div class="input-group">
            <label for="specialite">Spécialité</label>
            <select name="specialty" required>
              <option value="">Choisir une spécialité </option>
              <option value="cardiologie">Cardiologie</option>
              <option value="pediatrie">Pédiatrie</option>
              <option value="dermatologie">Dermatologie</option>
              <option value="neurologie">Neurologie</option>
              <option value="chirurgie">Chirurgie</option>
              <option value="oncologie">Oncologie</option>
              <option value="ophtalmologie">Ophtalmologie</option>
              <option value="orthopedie">Orthopédie</option>
              <option value="psychiatrie">Psychiatrie</option>
              <option value="gynecologie">Gynécologie</option>
              <option value="urologie">Urologie</option>
              <option value="radiologie">Radiologie</option>
              <option value="anesthesie">Anesthésie</option>
              <option value="medecine_generale">Médecine Générale</option>
            </select>
          </div>

        </div>

        <div class="form-row">

          <div class="input-group">
            <label>Mot de passe</label>
            <input type="password" name="password" placeholder="Mot de passe" required>
          </div>

          <div class="input-group">
            <label>Confirmer mot de passe</label>
            <input type="password" name="confirm" placeholder="Confirmer" required>
          </div>

        </div>

        <input type="hidden" name="role" value="doctor">

        <button type="submit" class="btn">
          S'inscrire
        </button>

        <div id="messageBox" style="margin-top: 15px; font-weight: bold; text-align: center;"></div>

      </form>

    </div>

  </div>



</body>

</html>
