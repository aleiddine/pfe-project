<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoCortisol - Choisir votre rôle</title>
    <meta name="description" content="Choisissez votre rôle pour accéder au système NoCortisol en tant qu'administrateur, médecin ou patient.">
    <link rel="stylesheet" href="selection.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="overlay-text">
    <h1>Bienvenue chez NoCortisol</h1>
    <p>Veuillez sélectionner votre rôle pour continuer</p>
</div>
<div class="container">
    <!-- Carte Admin -->
    <a href="selectionRole?role=admin" class="card" style="background-image: url('admin_bg.png');" id="card-admin">
        <div class="card-content">
            <h2>Administrateur</h2>
            <p>Gérer le système</p>
        </div>
    </a>

    <!-- Carte Médecin -->
    <a href="selectionRole?role=doctor" class="card" style="background-image: url('dr.jpg');" id="card-doctor">
        <div class="card-content">
            <h2>Médecin</h2>
            <p>Accéder à votre planning</p>
        </div>
    </a>

    <!-- Carte Patient -->
    <a href="selectionRole?role=patient" class="card" style="background-image: url('patient.jpeg');" id="card-patient">
        <div class="card-content">
            <h2>Patient</h2>
            <p>Réserver un rendez-vous</p>
        </div>
    </a>
</div>
</body>
</html>
