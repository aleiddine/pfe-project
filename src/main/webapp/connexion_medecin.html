<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Connexion Médecin - NoCortisol</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #fff;
            padding: 30px 25px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .logo {
            width: 80px;
            margin-bottom: 15px;
            border-radius: 50%;
        }

        h2 {
            color: #0077b6;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .input-box {
            position: relative;
            margin-bottom: 15px;
        }

        .input-box i {
            position: absolute;
            left: 10px;
            top: 12px;
            color: #0077b6;
        }

        input {
            width: 100%;
            padding: 12px 12px 12px 38px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #0077b6;
            box-shadow: 0 0 5px rgba(0, 119, 182, 0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0077b6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            outline: none;
        }

        button:hover {
            background: #005f8b;
            transform: translateY(-2px);
        }

        .btn-register {
            background: #28a745;
            margin-top: 10px;
        }

        .btn-register:hover {
            background: #218838;
        }

        .medical-img {
            width: 100px;
            margin-top: 20px;
            opacity: 0.9;
        }
    </style>
</head>

<body>
<div class="container">

    <img src="medecin1.png" class="logo" alt="Logo Médecin">

    <h2>Connexion Médecin</h2>

    <form action="connexion" method="POST">
        <div class="input-box">
            <i class="fa fa-envelope"></i>
            <input type="email" name="email" placeholder="Email" required>
        </div>
        <div class="input-box">
            <i class="fa fa-lock"></i>
            <input type="password" name="password" placeholder="Mot de passe" required>
        </div>
        <input type="hidden" name="role" value="doctor">
        <button type="submit"><i class="fa fa-sign-in-alt"></i> Se connecter</button>
    </form>

    <div style="margin-top: 15px;">
        <p style="margin-bottom: 5px; color: #555; font-size: 14px;">Vous n'avez pas de compte ?</p>
        <a href="inscription_medecin.html" style="text-decoration: none;">
            <button type="button" class="btn-register"><i class="fa fa-user-plus"></i> S'inscrire</button>
        </a>
    </div>

    <img src="https://cdn-icons-png.flaticon.com/512/2966/2966327.png" class="medical-img" alt="Médecine">

    <div style="margin-top: 15px;">
        <a href="index.html" style="color: #64748b; text-decoration: none; font-size: 14px;"><i class="fas fa-arrow-left"></i> Retour à l'accueil</a>
    </div>
</div>
</body>

</html>
